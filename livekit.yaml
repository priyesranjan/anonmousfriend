port: 7880
rtc:
  tcp_port: 7881
  use_external_ip: true

# Built-in TURN server — ensures calls work on mobile data behind NAT/firewalls
turn:
  enabled: true
  domain: livekit.appdost.com
  tls_port: 5349
  udp_port: 3478
  external_tls: false

# Keys: format is "apiKey: apiSecret"
# Must match LIVEKIT_API_KEY / LIVEKIT_API_SECRET in backend docker-compose env
keys:
  devkey: secret

logging:
  level: warn
