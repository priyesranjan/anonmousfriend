version: '3.8'

services:
  # ======== LIVEKIT (WebRTC voice server) ========
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit_server
    restart: always
    ports:
      - "7880:7880" # WebSocket / HTTP (primary connection port) — open in VPS firewall
      - "7881:7881/tcp" # TCP RTC fallback — open in VPS firewall
      - "3478:3478/udp" # TURN UDP — open in VPS firewall
      - "5349:5349/tcp" # TURN TLS — open in VPS firewall
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          use_external_ip: true
        turn:
          enabled: true
          domain: livekit.appdost.com
          tls_port: 5349
          udp_port: 3478
          external_tls: false
        keys:
          devkey: secret
        logging:
          level: warn
    networks:
      - coolify
      - default

  # ======== BACKEND ========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: callto_backend
    restart: always
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      - livekit
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-hGcIz9HHsj6bwkTbm1NLfzGYMV09wJB5U33TynV3yHdBSCHGuPEST28h9jCk7OiX}
      - DB_HOST=${DB_HOST:-rksw88cskw0o8ssg04g8c008}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-postgres}
      # Internal Coolify network URL (used by default inside Docker)
      - DATABASE_PUBLIC_URL=${DATABASE_PUBLIC_URL:-postgres://postgres:hGcIz9HHsj6bwkTbm1NLfzGYMV09wJB5U33TynV3yHdBSCHGuPEST28h9jCk7OiX@rksw88cskw0o8ssg04g8c008:5432/postgres}
      - JWT_SECRET=${JWT_SECRET:-kJ8#mP2$vN5xQ9wL3rF7yT4uA6cE1bD0hG}
      # LiveKit credentials — must match livekit.yaml keys section
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      # Public WSS URL the MOBILE APP uses to connect (port 7880 exposed on VPS)
      - LIVEKIT_URL=${LIVEKIT_URL:-wss://livekit.appdost.com:7880}
    networks:
      - coolify
      - default

  # ======== ADMIN PANEL ========
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: callto_admin_panel
    restart: always
    ports:
      - "${ADMIN_PORT:-8888}:80"
    depends_on:
      - backend
    networks:
      - coolify
      - default

# Connect to Coolify's internal network to reach the PostgreSQL container
networks:
  coolify:
    external: true
