version: '3.8'

services:
  # ======== LIVEKIT (WebRTC voice server) ========
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit_server
    restart: always
    ports:
      - "7880:7880"       # WebSocket / HTTP (primary connection port) — open in VPS firewall
      - "7881:7881/tcp"   # TCP RTC fallback — open in VPS firewall
      - "3478:3478/udp"   # TURN UDP — open in VPS firewall
      - "5349:5349/tcp"   # TURN TLS — open in VPS firewall
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml

  # ======== BACKEND ========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: callto_backend
    restart: always
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      - livekit
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      # If Postgres is natively installed on Linux VPS, host.docker.internal works in newer Docker, 
      # or you can use the static server IP.
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-calltodb}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/${DB_NAME:-calltodb}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      # LiveKit credentials — must match livekit.yaml keys section
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      # Public WSS URL the MOBILE APP uses to connect (port 7880 exposed on VPS)
      - LIVEKIT_URL=${LIVEKIT_URL:-wss://livekit.appdost.com:7880}

  # ======== ADMIN PANEL ========
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: callto_admin_panel
    restart: always
    ports:
      - "${ADMIN_PORT:-8888}:80"
    depends_on:
      - backend
